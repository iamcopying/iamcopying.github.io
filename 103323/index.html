  <div class="post-content"><p>最近有个项目使用 STM32F407 USART1 串口发送数据，借助 DMA 方式。</p>
<p>发现一个问题：需要检测发送完成标志位后清除标志位后才能再次发送，而之前使用 STM32F103 却不需要清标志位的操作。</p>
<p>清除标志位的示例代码如下：</p>
<figure class="highlight c" data-language="C"><table><tr><td class="code"><pre><code class="hljs C" data-language="C"><span class="hljs-keyword">if</span> (DMA_GetFlagStatus(DMA2_Stream7, DMA_FLAG_TCIF7) != RESET) &#123; <br>    DMA_ClearFlag(DMA2_Stream7, DMA_FLAG_TCIF7);<br>&#125;<br></code></pre></td></tr></table></figure></div>
