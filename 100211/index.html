  <div class="post-content"><p>有些嵌入式系统的 IDE 不支持结构体，改为数组方式。</p>
<figure class="highlight c" data-language="C"><table><tr><td class="code"><pre><code class="hljs C" data-language="C"><span class="hljs-meta">#<span class="hljs-keyword">include</span> <span class="hljs-string">&lt;stdio.h&gt;</span></span><br><span class="hljs-meta">#<span class="hljs-keyword">define</span> LEN 100</span><br><span class="hljs-type">float</span> DataInX[LEN];<br><span class="hljs-type">float</span> DataInY[LEN];<br><span class="hljs-type">unsigned</span> <span class="hljs-type">char</span> GucDataLength;<br><span class="hljs-type">void</span> <span class="hljs-title function_">push</span><span class="hljs-params">(<span class="hljs-type">float</span> x, <span class="hljs-type">float</span> y)</span> &#123;<br>    <span class="hljs-type">int</span> i = <span class="hljs-number">0</span>;<br>    <span class="hljs-keyword">if</span> (GucDataLength &lt; LEN) &#123;<br>        DataInX[GucDataLength] = x;<br>        DataInY[GucDataLength++] = y;<br>        <span class="hljs-keyword">return</span>;<br>    &#125;<br>    <span class="hljs-comment">// 数据移动,去掉最后一个数据</span><br>    <span class="hljs-keyword">for</span> (i = <span class="hljs-number">0</span>; i &lt; LEN - <span class="hljs-number">1</span>; i++) &#123;<br>        DataInX[i] = DataInX[i + <span class="hljs-number">1</span>];<br>        DataInY[i] = DataInY[i + <span class="hljs-number">1</span>];<br>    &#125;<br>    DataInY[LEN] = x;<br>    DataInY[LEN] = y;<br>    GucDataLength = LEN;<br>&#125;<br><br><span class="hljs-type">float</span> <span class="hljs-title function_">calc</span><span class="hljs-params">(<span class="hljs-type">float</span> x)</span> &#123;<br>    <span class="hljs-type">int</span> i = <span class="hljs-number">0</span>;<br>    <span class="hljs-type">float</span> mean_x = <span class="hljs-number">0</span>;<br>    <span class="hljs-type">float</span> mean_y = <span class="hljs-number">0</span>;<br>    <span class="hljs-type">float</span> num1 = <span class="hljs-number">0</span>;<br>    <span class="hljs-type">float</span> num2 = <span class="hljs-number">0</span>;<br>    <span class="hljs-type">float</span> a = <span class="hljs-number">0</span>;<br>    <span class="hljs-type">float</span> b = <span class="hljs-number">0</span>;<br>    <span class="hljs-comment">//求t,y的均值</span><br>    <span class="hljs-keyword">for</span> (i = <span class="hljs-number">0</span>; i &lt; GucDataLength; i++) &#123;<br>        mean_x += DataInX[i];<br>        mean_y += DataInY[i];<br>    &#125;<br>    mean_x /= GucDataLength;<br>    mean_y /= GucDataLength;<br>    <span class="hljs-built_in">printf</span>(<span class="hljs-string">&quot;mean_x = %f,mean_y = %f\n&quot;</span>, mean_x, mean_y);<br>    <span class="hljs-keyword">for</span> (i = <span class="hljs-number">0</span>; i &lt; GucDataLength; i++) &#123;<br>        num1 += (DataInX[i] - mean_x) * (DataInY[i] - mean_y);<br>        num2 += (DataInX[i] - mean_x) * (DataInX[i] - mean_x);<br>    &#125;<br>    a = num1 / num2;<br>    b = mean_y - b * mean_x;<br>    <span class="hljs-built_in">printf</span>(<span class="hljs-string">&quot;a = %f,b = %f\n&quot;</span>, a, b);<br>    <span class="hljs-keyword">return</span> (a * x + b);<br>&#125;<br><br><span class="hljs-type">int</span> <span class="hljs-title function_">main</span><span class="hljs-params">()</span> &#123;<br>    <span class="hljs-type">float</span> data_x[<span class="hljs-number">7</span>] = &#123;<span class="hljs-number">0</span>, <span class="hljs-number">1</span>, <span class="hljs-number">2</span>, <span class="hljs-number">3</span>, <span class="hljs-number">4</span>, <span class="hljs-number">5</span>, <span class="hljs-number">6</span>&#125;;<br>    <span class="hljs-type">float</span> data_y[<span class="hljs-number">7</span>] = &#123;<span class="hljs-number">-88</span>, <span class="hljs-number">16</span>, <span class="hljs-number">-20</span>, <span class="hljs-number">11</span>, <span class="hljs-number">1</span>, <span class="hljs-number">1</span>, <span class="hljs-number">-60</span>&#125;;<br>    <span class="hljs-type">int</span> i = <span class="hljs-number">0</span>;<br>    <span class="hljs-keyword">for</span> (i = <span class="hljs-number">0</span>; i &lt; <span class="hljs-number">7</span>; i++) &#123;<br>        push(data_x[i], data_y[i]);<br>    &#125;<br>    <span class="hljs-comment">/* 计算x=10时y值 */</span><br>    <span class="hljs-built_in">printf</span>(<span class="hljs-string">&quot;data_y[10] = %f\n&quot;</span>, calc(<span class="hljs-number">10</span>));<br>    <span class="hljs-keyword">return</span> <span class="hljs-number">0</span>;<br>&#125;<br></code></pre></td></tr></table></figure>
